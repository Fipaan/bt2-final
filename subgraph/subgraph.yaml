specVersion: 0.0.8
schema:
  file: ./schema.graphql
features:
  - nonFatalErrors
dataSources:
  - kind: ethereum/contract
    name: MyGovernor
    network: arbitrum-sepolia
    source:
      address: "0x45bcfCA8CB484B64c61E9a6760a32400049043C7"
      abi: MyGovernor
      startBlock: 269181852
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
      abis:
        - name: MyGovernor
          file: ./abis/MyGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalQueued(uint256,uint256)
          handler: handleProposalQueued
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
        - event: ProposalCanceled(uint256)
          handler: handleProposalCanceled
      file: ./src/governor.ts
  - kind: ethereum/contract
    name: AMM
    network: arbitrum-sepolia
    source:
      address: "0xc1e094e1077F5c6F32e6909Ab06350522A9fd97f"
      abi: AMM
      startBlock: 269160653
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Pool
        - LiquidityEvent
        - SwapEvent
      abis:
        - name: AMM
          file: ./abis/AMM.json
      eventHandlers:
        - event: LiquidityAdded(indexed address,indexed uint256,indexed uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,indexed uint256,indexed uint256,uint256)
          handler: handleLiquidityRemoved
        - event: Swap(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleSwap
      file: ./src/amm.ts
  - kind: ethereum/contract
    name: Equestria1155
    network: arbitrum-sepolia
    source:
      address: "0xCCd814f7ff92D676465dda56C0AE4864f969482A"
      abi: Equestria1155
      startBlock: 269160662
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TokenBalance
        - NftTransfer
        - CraftRequest
        - CraftFulfillment
        - OperatorApproval
      abis:
        - name: Equestria1155
          file: ./abis/Equestria1155.json
      eventHandlers:
        - event: TransferSingle(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleTransferSingle
        - event: TransferBatch(indexed address,indexed address,indexed address,uint256[],uint256[])
          handler: handleTransferBatch
        - event: ApprovalForAll(indexed address,indexed address,bool)
          handler: handleApprovalForAll
        - event: CraftRequested(indexed uint256,indexed address,indexed uint256)
          handler: handleCraftRequested
        - event: CraftFulfilled(indexed uint256,indexed address,indexed uint256)
          handler: handleCraftFulfilled
      file: ./src/equestria1155.ts
  - kind: ethereum/contract
    name: NFTRentalVault
    network: arbitrum-sepolia
    source:
      address: "0x545ff10B317525444d0F6F7Fcd7aE1b247F8Ff97"
      abi: NFTRentalVault
      startBlock: 269160672
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Rental
        - VaultStat
        - YieldInjection
        - BoostUpdate
      abis:
        - name: NFTRentalVault
          file: ./abis/NFTRentalVault.json
      eventHandlers:
        - event: NFTStaked(indexed address,indexed uint256)
          handler: handleNFTStaked
        - event: NFTUnstaked(indexed address,indexed uint256)
          handler: handleNFTUnstaked
        - event: YieldInjected(indexed uint256)
          handler: handleYieldInjected
        - event: BoostUpdated(indexed uint256)
          handler: handleBoostUpdated
      file: ./src/vault.ts
  - kind: ethereum/contract
    name: GameTokenFactory
    network: arbitrum-sepolia
    source:
      address: "0xE87AB83509812C5b380F6C4d2F69f34CA73404aD"
      abi: GameTokenFactory
      startBlock: 269160664
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - CreatedToken
      abis:
        - name: GameTokenFactory
          file: ./abis/GameTokenFactory.json
      eventHandlers:
        - event: TokenCreated(indexed address,indexed bytes32,indexed bool)
          handler: handleTokenCreated
      file: ./src/factory.ts
  - kind: ethereum/contract
    name: VRFConsumer
    network: arbitrum-sepolia
    source:
      address: "0x06daDF4b762b4fafDc39981f91D5a488CafC4b12"
      abi: VRFConsumer
      startBlock: 269160676
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - RandomRequest
      abis:
        - name: VRFConsumer
          file: ./abis/VRFConsumer.json
      eventHandlers:
        - event: RandomRequested(indexed uint256,indexed address)
          handler: handleRandomRequested
        - event: RandomFulfilled(indexed uint256,indexed uint256)
          handler: handleRandomFulfilled
      file: ./src/vrf.ts
